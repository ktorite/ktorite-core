<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
  <meta charset="utf-8">
  <title>Ktorite Admin</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 1rem;
      background: #eff1f5;
      color: #4c4f69;
    }

    nav {
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      color: #6c6f85;
    }

    nav a {
      text-decoration: none;
      color: #1e66f5;
    }

    .btn {
      display: inline-block;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.875rem;
    }

    .btn-primary {
      background: #1e66f5;
      color: #fff;
    }

    .btn-danger {
      background: #d20f39;
      color: #fff;
    }

    .alert-info {
      background: #e6e9ef;
      color: #1e66f5;
      padding: 0.5rem;
      border-radius: 4px;
      margin-bottom: 1rem;
    }
  </style>
</head>

<body>
  <nav><a href="/admin">Home</a></nav>
  <h1>Ktorite Admin</h1>
  <p class="alert-info" th:text="${' ' + modelCount + ' model(s) registered'}"></p>
  <ul>
    <li th:each="m : ${models}"><a th:href="${'/admin/' + m.tableName.toLowerCase()}" th:text="${m.tableName}">Model</a>
    </li>
  </ul>
  <form method="post" action="/logout" style="margin-top:2rem"><button type="submit"
      class="btn btn-danger">Logout</button></form>
</body>

</html>
